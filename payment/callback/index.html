<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Verifying Payment | Posbok</title>
   <link rel="stylesheet" href="../../CSS/style.css">
   <style>
      .payment-callback {
         display: flex;
         justify-content: center;
         align-items: center;
         height: 80vh;
         text-align: center;
      }

      .callback-box {
         background: #fff;
         padding: 2rem;
         border-radius: 12px;
         box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
         max-width: 400px;
         width: 100%;
      }

      .loader {
         border: 4px solid #f3f3f3;
         border-top: 4px solid #3498db;
         border-radius: 50%;
         width: 40px;
         height: 40px;
         animation: spin 1s linear infinite;
         margin: 20px auto;
      }

      @keyframes spin {
         0% {
            transform: rotate(0deg);
         }

         100% {
            transform: rotate(360deg);
         }
      }
   </style>
</head>

<body>

   <section class="payment-callback">
      <div class="callback-box">
         <h2 id="status-title">Verifying Payment</h2>
         <p id="status-text">Please wait while we confirm your payment transaction.</p>
         <div class="loader" id="main-loader"></div>
      </div>
   </section>

   <div id="toast" class="toast">
      <h4 class="toast-message heading-subtext center-text mb-2">This is a toast message!</h4>

      <!-- <button class="close-toast hero-btn-dark mr-0">Okay</button> -->

   </div>

   <div id="global-loader" class="loader-overlay hidden">
      <div class="spinner"></div>
   </div>


   <script src="../../dist/callback.bundle.js" defer></script>
</body>

</html>
